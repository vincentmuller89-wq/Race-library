<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Race Library - Affichage Forcé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f1f5f9; font-family: sans-serif; padding: 15px; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 10px; border-left: 5px solid #f43f5e; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .photo-mini { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #eee; }
    </style>
</head>
<body>

    <h1 class="text-xl font-black uppercase text-slate-800 mb-4">Mes Courses <span id="count" class="text-rose-500"></span></h1>

    <div id="container">
        <p class="text-slate-400">Recherche des données...</p>
    </div>

<script>
    function renderForced() {
        const container = document.getElementById('container');
        const countDisplay = document.getElementById('count');
        
        // On récupère la clé que ton téléphone a trouvé
        const rawData = localStorage.getItem('data_v32_Vincent');
        
        if (!rawData) {
            container.innerHTML = "❌ Erreur : La clé 'data_v32_Vincent' est vide au moment du rendu.";
            return;
        }

        try {
            const data = JSON.parse(rawData);
            countDisplay.innerText = "(" + data.length + ")";

            if (data.length === 0) {
                container.innerHTML = "La liste est vide (0 course).";
                return;
            }

            // On affiche chaque course avec un design ultra simple pour éviter les bugs
            container.innerHTML = data.map(r => `
                <div class="card">
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="text-[10px] font-bold text-slate-400">${r.d || 'Pas de date'}</p>
                            <h2 class="font-black text-lg text-slate-800 uppercase italic">${r.n || 'Sans titre'}</h2>
                            <p class="font-bold text-rose-500">${r.k || '0'} km — ${r.t || '--:--'}</p>
                        </div>
                        <div class="flex gap-1">
                            ${r.i1 ? `<img src="${r.i1}" class="photo-mini">` : ''}
                            ${r.i2 ? `<img src="${r.i2}" class="photo-mini">` : ''}
                        </div>
                    </div>
                </div>
            `).join('');

        } catch (e) {
            container.innerHTML = "❌ Erreur de lecture : Les données sont mal formées.";
            console.error(e);
        }
    }

    // On lance l'affichage immédiatement
    renderForced();
</script>
</body>
</html>
