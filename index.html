<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Race Library Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #ff5e62; --sub: #ff9966; --bg: #f8fafc; }
        body { background-color: var(--bg); color: #1e293b; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* Liste des Courses */
        .card-race { background: white; border-radius: 28px; margin-bottom: 24px; overflow: hidden; box-shadow: 0 12px 30px -10px rgba(0,0,0,0.08); position: relative; }
        .img-box { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; height: 180px; background: #eee; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Barre des RP sur une ligne */
        .rp-bar { background: white; border-radius: 24px; padding: 18px 10px; margin-bottom: 25px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .rp-item { text-align: center; flex: 1; border-right: 1px solid #f1f5f9; }
        .rp-item:last-child { border-right: none; }
        .rp-val { font-size: 1.1rem; font-weight: 900; color: #1e293b; letter-spacing: -0.025em; }

        /* Formulaire */
        .modal { position: fixed; inset: 0; background: white; z-index: 1000; overflow-y: auto; padding: 24px; display: none; }
        .field { background: #f1f5f9; border-radius: 20px; padding: 14px 18px; margin-bottom: 16px; }
        .field label { display: block; font-size: 10px; font-weight: 900; color: var(--main); text-transform: uppercase; margin-bottom: 2px; }
        .field input { background: transparent; border: none; width: 100%; font-weight: 700; outline: none; font-size: 18px; }
        
        .btn-joy { background: linear-gradient(135deg, var(--main), var(--sub)); color: white; font-weight: 900; border-radius: 22px; padding: 20px; width: 100%; text-transform: uppercase; transition: all 0.2s; }
        .btn-joy:disabled { opacity: 0.4; filter: grayscale(1); }
        
        .upload-zone { border: 2px dashed #e2e8f0; border-radius: 20px; padding: 20px; text-align: center; transition: all 0.3s; }
        .upload-zone.active { border-color: #10b981; background: #ecfdf5; color: #10b981; }
        
        .badge-delete { position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.9); color: #94a3b8; width: 32px; height: 32px; border-radius: 50%; display: flex; items-center; justify-content: center; font-weight: bold; z-index: 10; }
    </style>
</head>
<body>

<div class="max-w-md mx-auto p-6 pb-32">
    <header class="flex justify-between items-center mb-8">
        <div onclick="openSelector()" class="cursor-pointer">
            <h1 class="text-2xl font-black italic tracking-tighter text-slate-800 uppercase">Race <span class="text-rose-500">Library</span></h1>
            <p id="displayProfile" class="text-[10px] font-black uppercase tracking-widest text-slate-400 italic">Chargement...</p>
        </div>
        <button onclick="openForm()" class="w-14 h-14 bg-rose-500 rounded-2xl flex items-center justify-center text-white shadow-lg">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
    </header>

    <!-- RP BAR OPTIMISÉE -->
    <div class="rp-bar">
        <div class="rp-item"><p class="text-[9px] font-black text-rose-400 uppercase">5k</p><p id="rp5" class="rp-val">--</p></div>
        <div class="rp-item"><p class="text-[9px] font-black text-rose-400 uppercase">10k</p><p id="rp10" class="rp-val">--</p></div>
        <div class="rp-item"><p class="text-[9px] font-black text-rose-400 uppercase">21k</p><p id="rp21" class="rp-val">--</p></div>
        <div class="rp-item"><p class="text-[9px] font-black text-rose-400 uppercase">42k</p><p id="rp42" class="rp-val">--</p></div>
    </div>

    <div id="raceList"></div>
</div>

<!-- FORMULAIRE -->
<div id="formModal" class="modal">
    <div class="flex justify-between items-center mb-8">
        <h2 class="text-2xl font-black italic uppercase">Nouvelle Course</h2>
        <button onclick="closeForm()" class="text-slate-400 text-2xl">✕</button>
    </div>
    
    <div class="field"><label>Nom de la course</label><input type="text" id="fName" placeholder="Ex: Marathon de Paris"></div>
    
    <div class="grid grid-cols-2 gap-4">
        <div class="field"><label>Distance (KM)</label><input type="number" id="fDist" step="0.01" placeholder="0.00"></div>
        <div class="field"><label>Chrono</label><input type="text" id="fTime" placeholder="00:00:00" oninput="formatTime(this)"></div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-8">
        <label class="upload-zone cursor-pointer" id="up1">
            <span id="txt1" class="text-[10px] font-black uppercase">Dossard</span>
            <input type="file" accept="image/*" class="hidden" onchange="uploadFile(this, 1)">
        </label>
        <label class="upload-zone cursor-pointer" id="up2">
            <span id="txt2" class="text-[10px] font-black uppercase">Course</span>
            <input type="file" accept="image/*" class="hidden" onchange="uploadFile(this, 2)">
        </label>
    </div>

    <button id="saveBtn" onclick="saveEntry()" class="btn-joy italic">Enregistrer la performance</button>
</div>

<!-- SELECTEUR PROFIL -->
<div id="profileModal" class="modal" style="display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.98);">
    <div class="w-full max-w-[280px] text-center">
        <h3 class="font-black text-3xl mb-8 italic uppercase">Qui court ?</h3>
        <button onclick="selectProfile('Vincent')" class="btn-joy py-6 text-xl mb-4">VINCENT</button>
        <button onclick="selectProfile('Albane')" class="btn-joy py-6 text-xl" style="background: linear-gradient(135deg, #6366f1, #a855f7);">ALBANE</button>
    </div>
</div>

<script>
    const CLOUD_NAME = "dt7tr0sec"; 
    const UPLOAD_PRESET = "ml_default";
    let currentProfile = localStorage.getItem('active_profile_race');
    let img1 = "", img2 = "";
    let isUploading = false;

    // Formatage HH:MM:SS
    function formatTime(input) {
        let v = input.value.replace(/\D/g, '');
        if (v.length > 6) v = v.slice(0, 6);
        if (v.length >= 5) v = v.replace(/(\d{2})(\d{2})(\d{2})/, "$1:$2:$3");
        else if (v.length >= 3) v = v.replace(/(\d{2})(\d{2})/, "$1:$2");
        input.value = v;
    }

    // Nettoyage de l'affichage (enlève les 00: de gauche)
    function cleanT(t) {
        if(!t) return "--";
        return t.replace(/^00:/, '');
    }

    function selectProfile(p) {
        currentProfile = p;
        localStorage.setItem('active_profile_race', p);
        document.getElementById('profileModal').style.display = 'none';
        document.getElementById('displayProfile').innerText = "Profil Actif : " + p;
        render();
    }

    if(currentProfile) selectProfile(currentProfile);

    function openSelector() { document.getElementById('profileModal').style.display = 'flex'; }
    function openForm() { 
        img1 = ""; img2 = ""; 
        document.getElementById('saveBtn').disabled = false;
        document.querySelectorAll('.upload-zone').forEach(z => { z.classList.remove('active'); });
        document.getElementById('txt1').innerText = "Dossard";
        document.getElementById('txt2').innerText = "Course";
        document.getElementById('formModal').style.display = 'block'; 
    }
    function closeForm() { document.getElementById('formModal').style.display = 'none'; }

    // Upload vers Cloudinary
    async function uploadFile(input, num) {
        const file = input.files[0]; if(!file) return;
        const zone = document.getElementById('up' + num);
        const txt = document.getElementById('txt' + num);
        const btn = document.getElementById('saveBtn');

        isUploading = true;
        btn.disabled = true;
        txt.innerText = "ENVOI...";

        const fd = new FormData();
        fd.append('file', file);
        fd.append('upload_preset', UPLOAD_PRESET);

        try {
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: fd });
            const data = await res.json();
            if(num === 1) img1 = data.secure_url; else img2 = data.secure_url;
            txt.innerText = "PRÊT ✓";
            zone.classList.add('active');
        } catch(e) {
            txt.innerText = "ERREUR";
        } finally {
            isUploading = false;
            btn.disabled = false;
        }
    }

    function saveEntry() {
        if(isUploading) return;
        const name = document.getElementById('fName').value;
        if(!name) return alert("Nom manquant");

        const key = 'data_v32_' + currentProfile;
        const data = JSON.parse(localStorage.getItem(key) || "[]");
        
        data.unshift({
            id: Date.now(),
            n: name,
            k: parseFloat(document.getElementById('fDist').value || 0),
            t: document.getElementById('fTime').value || "00:00:00",
            i1: img1,
            i2: img2,
            d: new Date().toLocaleDateString('fr-FR')
        });

        localStorage.setItem(key, JSON.stringify(data));
        closeForm();
        render();
    }

    function render() {
        const data = JSON.parse(localStorage.getItem('data_v32_' + currentProfile) || "[]");
        const list = document.getElementById('raceList');
        
        // Calcul RP
        const records = { "5": null, "10": null, "21.1": null, "42.2": null };
        data.forEach(r => {
            const dist = parseFloat(r.k);
            const timeParts = r.t.split(':').map(Number);
            const totalSec = (timeParts.length === 3) ? (timeParts[0]*3600 + timeParts[1]*60 + timeParts[2]) : (timeParts[0]*60 + timeParts[1]);
            
            // On vérifie les distances standards
            for (let target in records) {
                if (Math.abs(dist - parseFloat(target)) < 0.2) {
                    if (!records[target] || totalSec < records[target].sec) {
                        records[target] = { sec: totalSec, text: r.t };
                    }
                }
            }
        });

        document.getElementById('rp5').innerText = cleanT(records["5"]?.text);
        document.getElementById('rp10').innerText = cleanT(records["10"]?.text);
        document.getElementById('rp21').innerText = cleanT(records["21.1"]?.text);
        document.getElementById('rp42').innerText = cleanT(records["42.2"]?.text);

        list.innerHTML = data.map(r => `
            <div class="card-race">
                <button onclick="deleteEntry(${r.id})" class="badge-delete">✕</button>
                <div class="img-box">
                    <img src="${r.i1 || 'https://via.placeholder.com/200x200?text=Dossard'}">
                    <img src="${r.i2 || 'https://via.placeholder.com/200x200?text=Course'}">
                </div>
                <div class="p-6">
                    <p class="text-[10px] font-black text-rose-400 uppercase mb-1">${r.d}</p>
                    <h3 class="text-xl font-black text-slate-800 italic uppercase mb-4">${r.n}</h3>
                    <div class="flex justify-between border-t border-slate-50 pt-4">
                        <div><p class="text-[9px] font-black text-slate-300 uppercase">Distance</p><p class="text-lg font-black">${r.k}k</p></div>
                        <div><p class="text-[9px] font-black text-slate-300 uppercase">Temps</p><p class="text-lg font-black italic">${cleanT(r.t)}</p></div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function deleteEntry(id) {
        if(confirm("Supprimer cette course ?")) {
            const key = 'data_v32_' + currentProfile;
            let data = JSON.parse(localStorage.getItem(key) || "[]");
            data = data.filter(r => r.id !== id);
            localStorage.setItem(key, JSON.stringify(data));
            render();
        }
    }
</script>
</body>
</html>
