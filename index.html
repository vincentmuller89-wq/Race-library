<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.O.S. Données</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .log-box { background: #1e293b; border-radius: 12px; padding: 15px; font-family: monospace; font-size: 11px; margin-bottom: 20px; border: 1px solid #334155; height: 150px; overflow-y: auto; }
        .btn-fix { background: #f43f5e; color: white; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; border: none; text-transform: uppercase; }
        .card { background: white; color: #1e293b; border-radius: 12px; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>

    <h1 class="text-xl font-black mb-4 uppercase">Restauration <span class="text-rose-500">Profonde</span></h1>

    <div id="logs" class="log-box">Attente du lancement...</div>

    <button onclick="deepMerge()" class="btn-fix">1. Fusionner toutes les sources</button>
    <button onclick="window.location.reload()" class="mt-4 w-full text-[10px] text-slate-400">2. Rafraîchir l'écran</button>

    <div id="preview" class="mt-8">
        <!-- Les courses récupérées apparaîtront ici -->
    </div>

<script>
    const log = (msg) => { document.getElementById('logs').innerHTML += `> ${msg}<br>`; };

    function deepMerge() {
        log("Lancement du scan profond...");
        let masterList = [];
        let profiles = ["Vincent", "Albane"];
        let versions = ["v30", "v31", "v32", ""]; // On cherche toutes les versions

        for (let i = 0; i < localStorage.length; i++) {
            let key = localStorage.key(i);
            let val = localStorage.getItem(key);

            // Si la clé ressemble à une clé de données
            if (key.includes("data") || val.includes('[{"')) {
                try {
                    let parsed = JSON.parse(val);
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        log(`Trouvé ${parsed.length} courses dans [${key}]`);
                        // On fusionne les données sans doublons (basé sur l'id ou le nom)
                        parsed.forEach(item => {
                            if (!masterList.find(m => m.n === item.n && m.d === item.d)) {
                                masterList.push(item);
                            }
                        });
                    }
                } catch(e) { log(`Erreur lecture sur ${key}`); }
            }
        }

        if (masterList.length > 0) {
            log(`<b>Total récupéré : ${masterList.length} courses!</b>`);
            // On sauvegarde cette liste propre dans la clé que l'appli utilise
            localStorage.setItem('data_v32_Vincent', JSON.stringify(masterList));
            localStorage.setItem('active_profile_race', 'Vincent');
            
            // Affichage immédiat
            const preview = document.getElementById('preview');
            preview.innerHTML = "<h3 class='font-bold mb-2'>Courses récupérées :</h3>";
            masterList.forEach(r => {
                preview.innerHTML += `<div class='card'><b>${r.n}</b> - ${r.k}km (${r.d})</div>`;
            });
            
            alert("Restauration réussie ! Les données sont prêtes.");
        } else {
            log("❌ Aucune donnée trouvée dans TOUTE la mémoire.");
            alert("Désolé, aucune donnée n'a pu être extraite. La mémoire semble vide.");
        }
    }
</script>
</body>
</html>
