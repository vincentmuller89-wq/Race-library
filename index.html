<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RECOUVREMENT TOTAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .debug-card { background: #1e293b; border: 1px solid #334155; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .found-item { background: #065f46; padding: 10px; margin-top: 5px; border-radius: 8px; font-family: monospace; font-size: 10px; overflow-wrap: break-word; }
        .btn { background: #ec4899; color: white; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <h1 class="text-xl font-black mb-4 text-pink-500 uppercase">Diagnostic Mémoire</h1>

    <div class="debug-card">
        <p class="text-xs text-slate-400 mb-2">Étape 1 : Lister tout ce que le téléphone contient</p>
        <button onclick="inspectAll()" class="btn">1. ANALYSER LA MÉMOIRE</button>
        <div id="storageList" class="mt-4 space-y-2 text-xs">
            <!-- Les clés trouvées s'afficheront ici -->
        </div>
    </div>

    <div id="recoveryZone" class="debug-card" style="display:none;">
        <p class="text-xs text-slate-400 mb-2">Étape 2 : Restaurer les données</p>
        <select id="keySelector" class="w-full bg-slate-900 p-3 rounded mb-2 text-sm"></select>
        <button onclick="repair()" class="btn !bg-indigo-600">2. RÉPARER CETTE CLÉ</button>
    </div>

    <p class="text-[10px] text-slate-500 text-center mt-10">
        Une fois les données réparées, je te redonnerai le code de l'application propre.
    </p>

<script>
    function inspectAll() {
        const list = document.getElementById('storageList');
        const zone = document.getElementById('recoveryZone');
        const selector = document.getElementById('keySelector');
        list.innerHTML = "";
        selector.innerHTML = "";
        
        if (localStorage.length === 0) {
            list.innerHTML = "❌ La mémoire est totalement vide.";
            return;
        }

        let foundCount = 0;
        for (let i = 0; i < localStorage.length; i++) {
            let key = localStorage.key(i);
            let val = localStorage.getItem(key);
            
            // On cherche les clés qui ressemblent à nos données
            if (val.includes('[') || key.includes('data')) {
                foundCount++;
                list.innerHTML += `<div class="found-item"><b>Clé:</b> ${key}<br><b>Aperçu:</b> ${val.substring(0, 50)}...</div>`;
                let opt = document.createElement('option');
                opt.value = key;
                opt.innerText = key;
                selector.appendChild(opt);
            }
        }

        if (foundCount > 0) {
            zone.style.display = "block";
            alert(foundCount + " source(s) de données détectée(s) !");
        } else {
            list.innerHTML = "❓ Des données existent mais ne ressemblent pas à des courses.";
        }
    }

    function repair() {
        const selectedKey = document.getElementById('keySelector').value;
        const data = localStorage.getItem(selectedKey);
        
        // On force la copie vers le nouveau système universel
        localStorage.setItem('active_profile_race', 'Vincent');
        localStorage.setItem('data_v32_Vincent', data);
        
        alert("✅ Données transférées vers 'Vincent' (v32). \n\nCopie maintenant le code de l'application que je vais te donner juste après.");
    }
</script>
</body>
</html>
