<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Race Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #ff6b00; --mint: #00ff94; --dark: #000; }
        body { background-color: var(--dark); color: white; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .font-race { font-family: 'Orbitron', sans-serif; }
        .card-race { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 28px; margin-bottom: 24px; overflow: hidden; position: relative; }
        .img-box { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; height: 180px; background: #111; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .modal { position: fixed; inset: 0; background: black; z-index: 1000; overflow-y: auto; padding: 24px; display: none; }
        .field { background: #111; border: 1px solid #222; border-radius: 18px; padding: 14px; margin-bottom: 14px; }
        .field label { display: block; font-size: 9px; font-weight: 900; color: var(--orange); text-transform: uppercase; margin-bottom: 4px; letter-spacing: 1px; }
        .field input, .field select, .field textarea { background: transparent; border: none; color: white; width: 100%; font-weight: 700; outline: none; font-size: 16px; }
        .btn-photo { background: #111; border: 2px dashed #333; border-radius: 18px; padding: 15px; text-align: center; display: block; cursor: pointer; }
        .btn-photo.uploading { border-color: var(--orange); color: var(--orange); animation: pulse 1s infinite; }
        .btn-photo.done { border-color: var(--mint); color: var(--mint); border-style: solid; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .btn-elite { background: var(--orange); color: black; font-weight: 900; font-style: italic; border-radius: 16px; padding: 18px; width: 100%; text-transform: uppercase; }
        .rp-grid { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 24px; padding: 20px; margin-bottom: 24px; }
        .badge-delete { position: absolute; top: 12px; right: 12px; background: rgba(255,0,0,0.1); color: #444; padding: 6px 12px; border-radius: 12px; font-size: 8px; font-weight: 900; }
    </style>
</head>
<body>

<div class="max-w-md mx-auto p-6 pb-32">
    
    <header class="flex justify-between items-start mb-10">
        <!-- Zone cliquable secrète sur le titre -->
        <div onclick="openSelector()" class="cursor-pointer active:opacity-50 transition-opacity">
            <h1 class="font-race text-2xl italic tracking-tighter">RACE LIBRARY</h1>
            <h2 id="displayProfile" class="text-orange-500 font-black text-xl italic uppercase leading-none mt-1">PROFIL ...</h2>
        </div>
        <div class="flex gap-2">
            <button onclick="openBackup()" class="w-10 h-10 flex items-center justify-center opacity-20">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            </button>
            <button onclick="openForm()" class="w-14 h-14 bg-orange-500 rounded-2xl flex items-center justify-center shadow-lg shadow-orange-500/30">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="4"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
        </div>
    </header>

    <div class="rp-grid">
        <p class="text-[9px] font-black text-zinc-500 uppercase tracking-widest mb-6 border-b border-zinc-900 pb-2">Records Personnels</p>
        <div class="grid grid-cols-2 gap-y-6 gap-x-8">
            <div><p class="text-[8px] text-orange-500 font-black uppercase">5 KM</p><p id="rp5" class="text-2xl font-black italic">--:--</p></div>
            <div><p class="text-[8px] text-orange-500 font-black uppercase">10 KM</p><p id="rp10" class="text-2xl font-black italic">--:--</p></div>
            <div><p class="text-[8px] text-orange-500 font-black uppercase">Semi</p><p id="rp21" class="text-2xl font-black italic">--:--</p></div>
            <div><p class="text-[8px] text-orange-500 font-black uppercase">Marathon</p><p id="rp42" class="text-2xl font-black italic">--:--</p></div>
        </div>
    </div>

    <div id="statsBox" class="grid grid-cols-2 gap-4 mb-10 text-center"></div>
    <div id="raceList"></div>
</div>

<!-- SELECTEUR SECRET -->
<div id="profileModal" class="modal" style="display: flex; align-items: center; justify-content: center; text-align: center;">
    <div class="w-full px-10">
        <h2 class="font-race text-2xl italic mb-10 tracking-widest opacity-50">SESSION</h2>
        <div class="flex flex-col gap-4">
            <button onclick="selectProfile('Vincent')" class="btn-elite py-6">VINCENT</button>
            <button onclick="selectProfile('Albane')" class="btn-elite py-6 bg-zinc-900 text-white border border-zinc-800">ALBANE</button>
        </div>
    </div>
</div>

<!-- SAUVEGARDE -->
<div id="backupModal" class="modal">
    <div class="flex justify-between items-center mb-8">
        <h2 class="text-xl font-black italic uppercase text-orange-500">Data Center</h2>
        <button onclick="closeBackup()" class="text-zinc-600 font-bold text-[10px] uppercase">Fermer</button>
    </div>
    <div class="field"><textarea id="backupText" rows="6" readonly class="text-[10px] font-mono opacity-50"></textarea></div>
    <button onclick="copyBackup()" class="btn-elite text-xs mb-10">Copier Code</button>
    <div class="field"><textarea id="importText" rows="3" placeholder="Coller ici..." class="text-[10px] font-mono"></textarea></div>
    <button onclick="runImport()" class="btn-elite text-xs bg-white text-black">Restaurer</button>
</div>

<!-- AJOUT -->
<div id="formModal" class="modal">
    <div class="flex justify-between items-center mb-8">
        <h2 class="text-2xl font-black italic uppercase text-orange-500">New Race</h2>
        <button onclick="closeForm()" class="text-zinc-600 font-bold text-[10px] uppercase">Annuler</button>
    </div>
    <div class="field"><label>Nom</label><input type="text" id="fName" placeholder="..."></div>
    <div class="grid grid-cols-2 gap-3">
        <div class="field"><label>Date</label><input type="date" id="fDate"></div>
        <div class="field"><label>Format</label><select id="fCat" onchange="autoDist()"><option value="Autre">Autre</option><option value="5 KM">5 KM</option><option value="10 KM">10 KM</option><option value="Semi">Semi</option><option value="Marathon">Marathon</option></select></div>
    </div>
    <div class="grid grid-cols-2 gap-3">
        <div class="field"><label>Distance (KM)</label><input type="number" id="fDist" step="0.01"></div>
        <div class="field"><label>Chrono</label><input type="text" id="fTime" placeholder="00:00:00"></div>
    </div>
    <div class="grid grid-cols-2 gap-3 mb-10">
        <label class="btn-photo" id="label1"><span id="txt1" class="text-[9px] font-black uppercase">Dossard</span><input type="file" accept="image/*" class="hidden" onchange="uploadToCloud(this, 1)"></label>
        <label class="btn-photo" id="label2"><span id="txt2" class="text-[9px] font-black uppercase">Action</span><input type="file" accept="image/*" class="hidden" onchange="uploadToCloud(this, 2)"></label>
    </div>
    <button onclick="saveEntry()" class="btn-elite text-lg">Enregistrer</button>
</div>

<script>
    const CLOUD_NAME = "dt7tr0sec"; 
    const UPLOAD_PRESET = "ml_default";
    const DB_KEY_VINCENT = 'data_v32_Vincent';
    const DB_KEY_ALBANE = 'data_v32_Albane';
    
    let currentProfile = localStorage.getItem('active_profile_race');
    let cloudImg1 = "", cloudImg2 = "";

    function selectProfile(p) {
        currentProfile = p;
        localStorage.setItem('active_profile_race', p);
        document.getElementById('profileModal').style.display = 'none';
        document.getElementById('displayProfile').innerText = "PROFIL " + p;
        render();
    }

    function openSelector() { document.getElementById('profileModal').style.display = 'flex'; }
    if(currentProfile) { selectProfile(currentProfile); } else { openSelector(); }

    async function uploadToCloud(input, num) {
        const file = input.files[0]; if(!file) return;
        const label = document.getElementById('label' + num);
        const txt = document.getElementById('txt' + num);
        label.classList.add('uploading'); txt.innerText = "...";
        const formData = new FormData(); formData.append('file', file); formData.append('upload_preset', UPLOAD_PRESET);
        try {
            const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: formData });
            const result = await response.json();
            if(num === 1) cloudImg1 = result.secure_url; else cloudImg2 = result.secure_url;
            label.classList.remove('uploading'); label.classList.add('done'); txt.innerText = "OK";
        } catch (e) { label.classList.remove('uploading'); }
    }

    function autoDist() {
        const c = document.getElementById('fCat').value; const d = document.getElementById('fDist');
        if(c==="5 KM") d.value="5.00"; else if(c==="10 KM") d.value="10.00";
        else if(c==="Semi") d.value="21.10"; else if(c==="Marathon") d.value="42.20";
    }

    function getPace(t, k) {
        if(!t || !k || k == 0) return "--";
        const p = t.split(':').map(Number);
        let s = (p.length===3) ? (p[0]*3600)+(p[1]*60)+p[2] : (p[0]*60)+p[1];
        let spk = s/k;
        return `${Math.floor(spk/60)}'${Math.round(spk%60).toString().padStart(2,'0')}`;
    }

    function render() {
        if(!currentProfile) return;
        const data = JSON.parse(localStorage.getItem('data_v32_' + currentProfile) || "[]");
        const box = document.getElementById('raceList');
        const totalKm = data.reduce((a,r) => a + (parseFloat(r.k)||0), 0);
        
        // Update RP
        const b = { "5.00": null, "10.00": null, "21.10": null, "42.20": null };
        data.forEach(r => {
            const dk = parseFloat(r.k).toFixed(2); if(b[dk] === undefined) return;
            const pts = r.t.split(':').map(Number);
            const sec = (pts.length === 3) ? (pts[0]*3600 + pts[1]*60 + pts[2]) : (pts[0]*60 + pts[1]);
            if(!b[dk] || sec < b[dk].s) b[dk] = { s: sec, t: r.t };
        });
        document.getElementById('rp5').innerText = b["5.00"] ? b["5.00"].t : "--:--";
        document.getElementById('rp10').innerText = b["10.00"] ? b["10.00"].t : "--:--";
        document.getElementById('rp21').innerText = b["21.10"] ? b["21.10"].t : "--:--";
        document.getElementById('rp42').innerText = b["42.20"] ? b["42.20"].t : "--:--";

        document.getElementById('statsBox').innerHTML = `
            <div class="bg-zinc-900/30 p-4 rounded-2xl border border-zinc-900"><p class="text-xl font-black">${data.length}</p><p class="text-[8px] font-bold text-zinc-600 uppercase">Races</p></div>
            <div class="bg-zinc-900/30 p-4 rounded-2xl border border-zinc-900"><p class="text-xl font-black text-mint">${totalKm.toFixed(1)}</p><p class="text-[8px] font-bold text-zinc-600 uppercase">Total KM</p></div>
        `;
        
        box.innerHTML = data.map(r => `
            <div class="card-race">
                <button onclick="deleteEntry(${r.id})" class="badge-delete">X</button>
                <div class="img-box"><img src="${r.i1 || ''}"><img src="${r.i2 || ''}"></div>
                <div class="p-6">
                    <p class="text-[10px] font-black text-orange-500 uppercase mb-1">${r.d} • ${r.c}</p>
                    <h3 class="text-xl font-black uppercase italic mb-6 leading-tight">${r.n}</h3>
                    <div class="grid grid-cols-3 gap-2 pt-5 border-t border-zinc-900 font-black">
                        <div><p class="text-[8px] text-zinc-500 uppercase">KM</p><p class="text-lg">${r.k}</p></div>
                        <div><p class="text-[8px] text-zinc-500 uppercase">Chrono</p><p class="text-lg italic">${r.t}</p></div>
                        <div class="text-right"><p class="text-[8px] text-zinc-500 uppercase font-black">Allure</p><p class="text-lg text-mint">${getPace(r.t, r.k)}</p></div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function saveEntry() {
        const n = document.getElementById('fName').value; if(!n) return;
        let pData = JSON.parse(localStorage.getItem('data_v32_' + currentProfile) || "[]");
        pData = [{ id: Date.now(), n, d: document.getElementById('fDate').value, c: document.getElementById('fCat').value, k: parseFloat(document.getElementById('fDist').value || 0), t: document.getElementById('fTime').value, i1: cloudImg1, i2: cloudImg2 }, ...pData];
        localStorage.setItem('data_v32_' + currentProfile, JSON.stringify(pData));
        cloudImg1 = ""; cloudImg2 = ""; closeForm(); render();
    }

    function deleteEntry(id) { if(confirm("Supprimer ?")) { const key = 'data_v32_' + currentProfile; let pData = JSON.parse(localStorage.getItem(key) || "[]"); pData = pData.filter(r => r.id !== id); localStorage.setItem(key, JSON.stringify(pData)); render(); } }
    function openBackup() {
        const v = localStorage.getItem(DB_KEY_VINCENT) || "[]"; const a = localStorage.getItem(DB_KEY_ALBANE) || "[]";
        document.getElementById('backupText').value = btoa(JSON.stringify({ vincent: JSON.parse(v), albane: JSON.parse(a) }));
        document.getElementById('backupModal').style.display = 'block';
    }
    function copyBackup() { document.getElementById('backupText').select(); document.execCommand('copy'); alert("Copié."); }
    function runImport() { try { const d = JSON.parse(atob(document.getElementById('importText').value)); localStorage.setItem(DB_KEY_VINCENT, JSON.stringify(d.vincent)); localStorage.setItem(DB_KEY_ALBANE, JSON.stringify(d.albane)); location.reload(); } catch(e) { alert("Error"); } }
    function closeBackup() { document.getElementById('backupModal').style.display = 'none'; }
    function openForm() { document.getElementById('formModal').style.display = 'block'; }
    function closeForm() { document.getElementById('formModal').style.display = 'none'; }
</script>
</body>
</html>
