<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Race Library - Restauration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --main: #ff5e62; --sub: #ff9966; --bg: #f8fafc; }
        body { background-color: var(--bg); font-family: sans-serif; padding: 15px; }
        .card-race { background: white; border-radius: 20px; margin-bottom: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .img-box { display: grid; grid-template-columns: 1fr 1fr; height: 140px; background: #eee; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .card-content { padding: 15px; }
        .btn-rescue { background: #1e293b; color: white; width: 100%; padding: 12px; border-radius: 12px; font-weight: bold; margin-bottom: 20px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="rescueZone">
        <button onclick="superScan()" class="btn-rescue">⚠️ RIEN NE S'AFFICHE ? CLIQUER ICI</button>
    </div>

    <header class="flex justify-between items-center mb-6">
        <h1 class="text-xl font-black uppercase italic">Race <span class="text-rose-500">Library</span></h1>
        <div id="profileName" class="text-[10px] font-bold text-indigo-500 uppercase">Profil : Vincent</div>
    </header>

    <div id="raceList">
        <!-- Les courses s'afficheront ici -->
    </div>

<script>
    // 1. Fonction de scan profond
    function superScan() {
        let foundData = null;
        let keysFound = [];

        // On parcourt TOUTE la mémoire du téléphone
        for (let i = 0; i < localStorage.length; i++) {
            let key = localStorage.key(i);
            let val = localStorage.getItem(key);
            
            // Si on trouve quelque chose qui ressemble à une liste de courses
            if (val.includes('[{"') || key.includes('data_')) {
                keysFound.push(key);
                foundData = val;
            }
        }

        if (keysFound.length > 0) {
            // On force la restauration sur la clé principale
            localStorage.setItem('data_v32_Vincent', foundData);
            localStorage.setItem('active_profile_race', 'Vincent');
            alert("Trouvé dans : " + keysFound.join(', ') + "\n\nRestauration réussie !");
            location.reload(); // On recharge pour appliquer
        } else {
            alert("Désolé, aucune donnée n'a été trouvée dans la mémoire de ce navigateur.");
        }
    }

    // 2. Affichage simple
    function render() {
        const list = document.getElementById('raceList');
        // On essaye de lire la clé v32 (la nouvelle) ou v31 (l'ancienne)
        const raw = localStorage.getItem('data_v32_Vincent') || localStorage.getItem('data_v31_Vincent') || "[]";
        const data = JSON.parse(raw);

        if (data.length === 0) {
            list.innerHTML = "<p class='text-center text-slate-400 text-sm mt-10'>Aucune course enregistrée.</p>";
            return;
        }

        list.innerHTML = data.map(r => `
            <div class="card-race">
                <div class="img-box">
                    ${r.i1 ? `<img src="${r.i1}">` : `<div class="flex items-center justify-center text-[8px] text-slate-400 uppercase">Photo 1</div>`}
                    ${r.i2 ? `<img src="${r.i2}">` : `<div class="flex items-center justify-center text-[8px] text-slate-400 uppercase">Photo 2</div>`}
                </div>
                <div class="card-content">
                    <p class="text-[10px] font-bold text-rose-500">${r.d}</p>
                    <h2 class="text-lg font-black uppercase italic">${r.n}</h2>
                    <p class="text-sm font-bold text-slate-600">${r.k} km — ${r.t}</p>
                </div>
            </div>
        `).join('');
    }

    render();
</script>
</body>
</html>
